name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    # Scoped to this job (not workflow-wide): only release-please needs write access —
    # to open/update the Release PR and push the tag + GitHub Release.
    permissions:
      contents: write
      pull-requests: write
    # Don't run on forks — only the canonical repo cuts releases.
    if: github.repository == 'acatl/harness'
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
